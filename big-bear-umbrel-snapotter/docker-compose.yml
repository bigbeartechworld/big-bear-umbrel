# Docker Compose configuration for SnapOtter.
# SnapOtter starts embedded Postgres and Redis when DATABASE_URL and REDIS_URL are unset.
version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: big-bear-umbrel-snapotter_snapotter_1
      APP_PORT: "1349"
  snapotter:
    image: snapotter/snapotter:2.0.0@sha256:de55c9279b067ea0bb5bfc7755dde6f72e727c8e1326629d1fa927cfbe6e3712
    restart: unless-stopped
    environment:
      - AUTH_ENABLED=true
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=admin
      - MAX_UPLOAD_SIZE_MB=0
      - MAX_BATCH_SIZE=0
      - CONCURRENT_JOBS=0
      - REDIS_MAXMEMORY=512mb
      - TRUST_PROXY=true
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/workspace:/tmp/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:1349/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
