# Configuration for myspeed setup
# Name of the big-bear-myspeed application
version: "3.7"
# Service definitions for the big-bear-myspeed application
services:
  app_proxy:
    environment:
      APP_HOST: big-bear-umbrel-myspeed_app_1
      APP_PORT: "5216"
  # Service name: app
  # The `app` service definition
  app:
    image: germannewsmaker/myspeed:1.0.9@sha256:3a3e774b3f78d930a5a962d625b99bcb3d71730bfeb4a6b93e04fd38cfe7d9a9 # Docker image to be used for the service
    volumes:
      - ${APP_DATA_DIR}/data:/myspeed/data # Mount host directory to container directory
    restart: unless-stopped # Restart policy for the service
