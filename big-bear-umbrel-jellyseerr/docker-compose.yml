version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: big-bear-umbrel-jellyseerr_app_1
      APP_PORT: "5055"
  app:
    image: fallenbagel/jellyseerr:2.7.3@sha256:4538137bc5af902dece165f2bf73776d9cf4eafb6dd714670724af8f3eb77764 # Image to use for the jellyseerr service
    volumes:
      - ${APP_DATA_DIR}/config:/app/config # Binds a volume from host to container for configuration
    environment:
      - LOG_LEVEL=debug # Sets the log level to debug
      - TZ=$TZ # Sets the timezone, using host's timezone variable
    restart: unless-stopped # Service will restart unless it is explicitly stopped
